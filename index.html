<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANTI.V | Official Software Center</title>
    <style>
        :root {
            --primary-blue: #1a73e8;
            --bg-light: #ffffff;
            --text-main: #3c4043;
            --gray-text: #5f6368;
            --border: #dadce0;
        }

        body {
            background-color: #f8f9fa;
            color: var(--text-main);
            font-family: 'Google Sans', Roboto, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .main-card {
            background: var(--bg-light);
            padding: 48px 40px;
            border-radius: 12px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        /* SVG LOGOTIP STILI */
        .logo-container {
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .logo-text {
            font-size: 26px;
            font-weight: 500;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        h2 {
            font-size: 24px;
            font-weight: 400;
            margin: 0 0 12px;
            color: #202124;
        }

        p.description {
            font-size: 14px;
            color: var(--gray-text);
            line-height: 1.5;
            margin-bottom: 32px;
        }

        .input-wrapper {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 13px 15px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
            transition: 0.2s;
        }

        input:focus {
            border: 2px solid var(--primary-blue);
            outline: none;
            padding: 12px 14px;
        }

        button {
            width: 100%;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 12px;
            transition: box-shadow 0.2s;
        }

        button:hover {
            box-shadow: 0 1px 3px rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15);
            background-color: #1b66ca;
        }

        .footer {
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: var(--gray-text);
            display: flex;
            justify-content: center;
            gap: 15px;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="logo-container">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L4 5V11C4 16.19 7.41 21.05 12 22.5C16.59 21.05 20 16.19 20 11V5L12 2Z" fill="#1a73e8"/>
                <path d="M9 12L11 14L15 10" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="logo-text">ANTI.V</span>
        </div>

        <h2>Xush kelibsiz</h2>
        <p class="description">Litsenziyani faollashtirish va so'nggi xavfsizlik yangilanishlarini yuklash uchun ma'lumotlarni kiriting.</p>

        <div id="formContainer">
            <div class="input-wrapper">
                <label>Foydalanuvchi nomi</label>
                <input type="text" id="uName" placeholder="Ismingizni yozing">
            </div>

            <div class="input-wrapper">
                <label>Elektron pochta</label>
                <input type="email" id="uEmail" placeholder="example@gmail.com">
            </div>

            <button onclick="submitAction()">Yuklashni boshlash</button>
        </div>

        <div class="footer">
            <span>Maxfiylik</span>
            <span>Yordam</span>
            <span>Shartlar</span>
        </div>
    </div>

    <script>
        function submitAction() {
            const name = document.getElementById('uName').value;
            const email = document.getElementById('uEmail').value;

            if(name.length > 2 && email.includes('@')) {
                alert("Rahmat, " + name + "! Ma'lumotlaringiz tasdiqlandi.");
                window.location.href = "https://github.com/yjasur039-cyber/ANTI.V/releases";
            } else {
                alert("Iltimos, ma'lumotlarni to'g'ri to'ldiring.");
            }
        }
    </script>

</body>
</html>
